<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Timer - Interval Training for iOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
        }
        .icon {
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, #f97316, #ef4444);
            border-radius: 22px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        .platform {
            font-size: 0.85rem;
            color: #737373;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1.5rem;
        }
        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #a3a3a3;
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #525252;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⏱️</div>
        <h1>Workout Timer</h1>
        <p class="platform">iOS</p>
        <p>Customizable interval timer for HIIT, Tabata, and all your workout routines.</p>
        <div class="footer">&copy; 2026 Adena Software</div>
    </div>
</body>
</html>
